<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>chisha debug · style options</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; }
    /* Each variant scoped under .v1 / .v2 / .v3 / .v4 */

    /* ─────────────────────────────────────────────
       Shared mock content sizing (artboard = 720x780)
       ───────────────────────────────────────────── */
    .ab { width: 720px; height: 780px; display: flex; flex-direction: column; }

    /* ─────────────────────────────────────────────
       V1 · Observability (current refined)
       ───────────────────────────────────────────── */
    .v1 {
      --bg-0: #07090d; --bg-1: #0d1117; --bg-2: #141a23; --bg-3: #1c2330;
      --border: #1f2734; --border-s: #2c3647;
      --t-0: #e9ecf2; --t-1: #b3bccb; --t-2: #818b9d; --t-3: #5c6577; --t-4: #404a5d;
      --green: oklch(0.74 0.16 145); --red: oklch(0.70 0.18 25);
      --orange: oklch(0.78 0.15 70); --blue: oklch(0.72 0.14 245); --violet: oklch(0.72 0.14 295);
      --sans: "IBM Plex Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg-0); color: var(--t-0); font-family: var(--sans); font-size: 13px;
    }
    .v1 .topline { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--bg-1); border-bottom: 1px solid var(--border); }
    .v1 .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; }
    .v1 .brand-dot { width: 10px; height: 10px; border-radius: 2px; background: linear-gradient(135deg, var(--orange), var(--red)); }
    .v1 .meta { font-family: var(--mono); font-size: 11px; color: var(--t-2); }

    .v1 .panel { background: var(--bg-1); border: 1px solid var(--border); border-radius: 6px; margin: 10px; }
    .v1 .panel-head { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, var(--bg-2), var(--bg-1)); border-radius: 6px 6px 0 0; }
    .v1 .tag { font-family: var(--mono); font-size: 10px; color: var(--t-3); padding: 2px 6px; border-radius: 3px; background: var(--bg-0); border: 1px solid var(--border); letter-spacing: 0.05em; }
    .v1 h3 { margin: 0; font-size: 13px; font-weight: 600; }
    .v1 .sub { font-size: 11px; color: var(--t-3); }
    .v1 .body { padding: 12px 14px; }

    .v1 .status-row { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--bg-2); border-bottom: 1px solid var(--border); }
    .v1 .badge.xl { font-family: var(--mono); font-size: 14px; font-weight: 600; padding: 5px 12px; border-radius: 3px; border: 1px solid; letter-spacing: 0.04em; display: inline-flex; align-items: center; gap: 6px; }
    .v1 .badge.xl .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .v1 .badge.green { color: var(--green); background: oklch(0.30 0.06 145 / 0.35); border-color: oklch(0.50 0.12 145 / 0.6); }
    .v1 .resolved { font-family: var(--mono); font-size: 11px; color: var(--t-2); }
    .v1 .resolved .val { color: var(--t-0); }
    .v1 .resolved .sep { color: var(--t-4); margin: 0 6px; }

    .v1 .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .v1 .meta-cell { background: var(--bg-1); padding: 8px 12px; }
    .v1 .meta-k { font-size: 10px; color: var(--t-3); text-transform: uppercase; letter-spacing: 0.06em; }
    .v1 .meta-v { font-family: var(--mono); font-size: 13px; margin-top: 2px; }

    .v1 .funnel-row { padding: 6px 0; border-top: 1px dashed var(--border); }
    .v1 .funnel-row:first-child { border-top: 0; }
    .v1 .fr-head { display: flex; justify-content: space-between; align-items: baseline; }
    .v1 .fr-name { font-size: 12px; color: var(--t-1); }
    .v1 .fr-val { font-family: var(--mono); font-weight: 600; }
    .v1 .fr-bar { height: 16px; background: var(--bg-3); border-radius: 2px; overflow: hidden; margin: 4px 0; }
    .v1 .fr-fill { height: 100%; background: linear-gradient(90deg, oklch(0.30 0.08 245 / 0.4), var(--blue)); }
    .v1 .fr-foot { font-family: var(--mono); font-size: 10px; color: var(--t-3); display: flex; justify-content: space-between; }
    .v1 .fr-foot .drop { color: var(--red); }

    .v1 .card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .v1 .rank { width: 22px; height: 22px; background: var(--bg-3); border: 1px solid var(--border-s); border-radius: 3px; display: inline-flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 600; }
    .v1 .reason-box { background: var(--bg-0); border-left: 2px solid var(--blue); padding: 8px 10px; font-size: 11px; color: var(--t-1); border-radius: 0 3px 3px 0; }
    .v1 .flag-ok { font-family: var(--mono); font-size: 10px; color: var(--green); border: 1px solid oklch(0.50 0.12 145 / 0.6); background: oklch(0.30 0.06 145 / 0.35); padding: 1px 6px; border-radius: 2px; }
    .v1 .flag-bad { font-family: var(--mono); font-size: 10px; color: var(--red); border: 1px solid oklch(0.50 0.14 25 / 0.6); background: oklch(0.32 0.08 25 / 0.4); padding: 1px 6px; border-radius: 2px; }

    /* ─────────────────────────────────────────────
       V2 · Terminal (k9s / btop / lazygit)
       ───────────────────────────────────────────── */
    .v2 {
      --bg: #050a07;
      --panel: #07100b;
      --line: #1a3324;
      --line2: #234d34;
      --t-0: #c0f5d0;
      --t-1: #74c98d;
      --t-2: #4a8c60;
      --t-3: #2c5c3e;
      --green: #00ff88;
      --amber: #ffb000;
      --red: #ff5a5a;
      --cyan: #58e8e8;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg); color: var(--t-0); font-family: var(--mono); font-size: 12px;
    }
    .v2 .topline { padding: 8px 12px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--line); }
    .v2 .topline .brand { color: var(--green); font-weight: 700; letter-spacing: 0.05em; }
    .v2 .topline .meta { color: var(--t-2); }

    .v2 .frame { margin: 10px; border: 1px solid var(--line); background: var(--panel); }
    .v2 .frame-head { padding: 4px 10px; border-bottom: 1px solid var(--line); background: #0a1810; color: var(--green); display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.04em; }
    .v2 .frame-head::before { content: "┌─"; color: var(--line2); margin-right: 4px; }
    .v2 .frame-head::after { content: "─┐"; color: var(--line2); margin-left: 4px; }
    .v2 .frame-head .right { color: var(--t-2); font-size: 11px; letter-spacing: 0; }
    .v2 .frame-head .right::before, .v2 .frame-head .right::after { content: ""; }
    .v2 .frame-body { padding: 10px 12px; }

    .v2 .status-line { padding: 10px 12px; background: #0a1810; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
    .v2 .stat-tag { background: var(--green); color: #000; padding: 4px 12px; font-weight: 700; letter-spacing: 0.1em; }
    .v2 .stat-tag.fail { background: var(--red); }
    .v2 .resolved-line { color: var(--t-1); }
    .v2 .resolved-line .k { color: var(--t-3); }
    .v2 .resolved-line .sep { color: var(--line2); margin: 0 6px; }

    .v2 .funnel-row { padding: 4px 0; display: grid; grid-template-columns: 1fr; gap: 2px; }
    .v2 .fr-head { display: flex; justify-content: space-between; }
    .v2 .fr-name { color: var(--t-1); }
    .v2 .fr-val { color: var(--green); font-weight: 600; }
    .v2 .fr-bar { font-size: 12px; line-height: 1; color: var(--green); letter-spacing: 0; }
    .v2 .fr-bar .empty { color: var(--line2); }
    .v2 .fr-foot { color: var(--t-3); display: flex; justify-content: space-between; }
    .v2 .fr-foot .drop { color: var(--amber); }

    .v2 .kv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-top: 1px dashed var(--line); }
    .v2 .kv { padding: 6px 10px; border-right: 1px dashed var(--line); }
    .v2 .kv:last-child { border-right: 0; }
    .v2 .kv .k { color: var(--t-3); }
    .v2 .kv .v { color: var(--green); }

    .v2 .card { border: 1px solid var(--line); padding: 10px; background: #060e0a; }
    .v2 .card-head { display: flex; align-items: center; gap: 8px; color: var(--t-1); }
    .v2 .card-head .rk { background: var(--green); color: #000; padding: 2px 6px; font-weight: 700; }
    .v2 .card-head .kind { color: var(--cyan); }
    .v2 .reason { color: var(--amber); padding: 6px 0; }
    .v2 .reason::before { content: "▎"; color: var(--amber); margin-right: 6px; }
    .v2 .flag-ok { color: var(--green); }
    .v2 .flag-bad { color: var(--red); }

    /* ─────────────────────────────────────────────
       V3 · Editorial / Calm (warm dark)
       ───────────────────────────────────────────── */
    .v3 {
      --bg-0: #16130f;
      --bg-1: #1c1814;
      --bg-2: #221d18;
      --bg-3: #2a241e;
      --line: #2b251f;
      --line2: #3a3127;
      --t-0: #ece4d6;
      --t-1: #c2b8a4;
      --t-2: #8a8170;
      --t-3: #5e5648;
      --green: oklch(0.78 0.10 150);
      --red:   oklch(0.72 0.14 30);
      --orange: oklch(0.78 0.12 60);
      --accent: oklch(0.78 0.08 65);   /* warm dusty amber */
      --serif: "Newsreader", "Source Serif Pro", Georgia, serif;
      --sans:  "IBM Plex Sans", system-ui, sans-serif;
      --mono:  "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg-0); color: var(--t-0); font-family: var(--sans); font-size: 13px;
    }
    .v3 .topline { display: flex; justify-content: space-between; align-items: baseline; padding: 16px 20px; border-bottom: 1px solid var(--line); }
    .v3 .brand { font-family: var(--serif); font-size: 18px; font-style: italic; letter-spacing: -0.01em; color: var(--t-0); }
    .v3 .brand .sub { font-family: var(--sans); font-style: normal; color: var(--t-3); font-size: 12px; margin-left: 8px; letter-spacing: 0.04em; text-transform: uppercase; }
    .v3 .meta { font-family: var(--mono); font-size: 11px; color: var(--t-2); }

    .v3 .section { padding: 16px 20px; }
    .v3 .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--t-3); margin-bottom: 8px; }
    .v3 h3 { margin: 0; font-family: var(--serif); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
    .v3 h3 .sub { font-family: var(--sans); font-size: 12px; color: var(--t-2); margin-left: 8px; }

    .v3 .status-row { display: flex; justify-content: space-between; align-items: flex-end; padding: 20px; border-bottom: 1px solid var(--line); }
    .v3 .status-row .left h3 { font-size: 26px; line-height: 1.1; }
    .v3 .status-row .ok-pill {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--green); font-family: var(--mono); font-size: 14px; font-weight: 500;
    }
    .v3 .status-row .ok-pill::before { content: ""; width: 8px; height: 8px; background: var(--green); border-radius: 50%; }
    .v3 .resolved { font-family: var(--mono); font-size: 11px; color: var(--t-2); margin-top: 4px; }
    .v3 .resolved .val { color: var(--t-0); }
    .v3 .resolved .sep { color: var(--line2); margin: 0 6px; }

    .v3 .kv-row { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--line); }
    .v3 .kv-row .kv { padding: 12px 20px; border-right: 1px solid var(--line); }
    .v3 .kv-row .kv:last-child { border-right: 0; }
    .v3 .kv .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t-3); }
    .v3 .kv .v { font-family: var(--mono); font-size: 15px; margin-top: 4px; }

    .v3 .funnel-row { display: grid; grid-template-columns: 1fr; gap: 4px; padding: 10px 0; border-top: 1px solid var(--line); }
    .v3 .funnel-row:first-of-type { border-top: 0; }
    .v3 .fr-head { display: flex; justify-content: space-between; align-items: baseline; }
    .v3 .fr-name { font-family: var(--serif); font-size: 14px; color: var(--t-0); }
    .v3 .fr-val { font-family: var(--mono); font-size: 16px; }
    .v3 .fr-bar { height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
    .v3 .fr-fill { height: 100%; background: var(--accent); }
    .v3 .fr-foot { font-family: var(--mono); font-size: 11px; color: var(--t-2); display: flex; justify-content: space-between; }
    .v3 .fr-foot .drop { color: var(--orange); }

    .v3 .card { padding: 16px 0; border-top: 1px solid var(--line); }
    .v3 .card .head { display: flex; gap: 12px; align-items: baseline; }
    .v3 .card .rank { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 22px; }
    .v3 .card h4 { margin: 0; font-family: var(--serif); font-size: 17px; font-weight: 500; }
    .v3 .card .kind { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t-2); }
    .v3 .card .meta { font-family: var(--mono); font-size: 12px; color: var(--t-2); margin-top: 4px; display: flex; gap: 16px; }
    .v3 .card .reason { font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--t-1); margin-top: 8px; padding-left: 12px; border-left: 2px solid var(--accent); }
    .v3 .flag-row { display: flex; flex-wrap: wrap; gap: 6px 12px; margin-top: 10px; font-family: var(--mono); font-size: 11px; }
    .v3 .flag-row .ok { color: var(--green); }
    .v3 .flag-row .bad { color: var(--red); }

    /* ─────────────────────────────────────────────
       V4 · Bloomberg / Trading desk
       ───────────────────────────────────────────── */
    .v4 {
      --bg: #000000;
      --panel: #070707;
      --grid: #1c1c1c;
      --t-0: #ffffff;
      --t-1: #c9c9c9;
      --t-2: #7a7a7a;
      --t-3: #4d4d4d;
      --amber: #ffb000;
      --cyan: #00d8d8;
      --magenta: #ff37a6;
      --lime: #b3ff00;
      --red: #ff3737;
      --mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg); color: var(--t-0); font-family: var(--mono); font-size: 12px; letter-spacing: 0;
    }
    .v4 .topline { background: var(--amber); color: #000; padding: 4px 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; letter-spacing: 0.06em; }
    .v4 .topline .meta { color: #000; opacity: 0.7; font-weight: 500; }

    .v4 .frame { border-top: 1px solid var(--grid); }
    .v4 .frame-head { padding: 5px 10px; display: flex; align-items: center; gap: 12px; background: var(--panel); border-bottom: 1px solid var(--grid); }
    .v4 .frame-head .tag { background: var(--cyan); color: #000; padding: 1px 7px; font-weight: 700; letter-spacing: 0.08em; }
    .v4 .frame-head .tag.amber { background: var(--amber); }
    .v4 .frame-head .tag.magenta { background: var(--magenta); }
    .v4 .frame-head h3 { margin: 0; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t-0); }
    .v4 .frame-head .sub { color: var(--t-2); font-size: 11px; }
    .v4 .frame-head .r { margin-left: auto; color: var(--lime); font-weight: 600; }
    .v4 .frame-body { padding: 10px 12px; }

    .v4 .status-bar { display: flex; align-items: center; gap: 14px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--grid); }
    .v4 .status-bar .big { background: var(--lime); color: #000; padding: 4px 14px; font-weight: 700; font-size: 15px; letter-spacing: 0.1em; }
    .v4 .resolved-line { color: var(--t-1); font-size: 12px; }
    .v4 .resolved-line .k { color: var(--t-3); text-transform: uppercase; }
    .v4 .resolved-line .v { color: var(--lime); }
    .v4 .resolved-line .v.amber { color: var(--amber); }
    .v4 .resolved-line .v.cyan { color: var(--cyan); }
    .v4 .resolved-line .sep { color: var(--grid); margin: 0 4px; }

    .v4 .kv-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--grid); }
    .v4 .kv { padding: 7px 12px; border-right: 1px solid var(--grid); border-bottom: 1px solid var(--grid); }
    .v4 .kv .k { color: var(--t-3); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; }
    .v4 .kv .v { font-size: 14px; color: var(--amber); font-weight: 600; margin-top: 1px; }
    .v4 .kv .v.cyan { color: var(--cyan); }
    .v4 .kv .v.magenta { color: var(--magenta); }

    .v4 .funnel-row { display: grid; grid-template-columns: 130px 1fr 90px 70px; gap: 8px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--grid); font-size: 11px; }
    .v4 .funnel-row .name { color: var(--t-1); text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
    .v4 .funnel-row .bar { height: 12px; background: var(--grid); position: relative; }
    .v4 .funnel-row .fill { height: 100%; background: var(--cyan); }
    .v4 .funnel-row .val { color: var(--amber); font-weight: 600; text-align: right; }
    .v4 .funnel-row .pct { color: var(--lime); text-align: right; }
    .v4 .funnel-row .drop { color: var(--red); }

    .v4 .card { padding: 10px 12px; border-bottom: 1px solid var(--grid); }
    .v4 .card-head { display: flex; gap: 10px; align-items: center; }
    .v4 .card-head .rk { background: var(--magenta); color: #000; padding: 2px 8px; font-weight: 700; }
    .v4 .card-head h4 { margin: 0; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--t-0); }
    .v4 .card-head .kind { background: var(--grid); color: var(--cyan); padding: 1px 6px; font-size: 10px; letter-spacing: 0.1em; }
    .v4 .card .meta { color: var(--t-2); font-size: 11px; margin-top: 4px; display: flex; gap: 14px; }
    .v4 .card .meta .v { color: var(--amber); }
    .v4 .card .reason { color: var(--lime); font-size: 11px; margin-top: 6px; padding: 4px 8px; border-left: 2px solid var(--lime); background: rgba(179,255,0,0.06); }
    .v4 .flag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .v4 .flag-row .flag { padding: 1px 6px; font-size: 10px; letter-spacing: 0.04em; }
    .v4 .flag-row .ok { background: var(--lime); color: #000; }
    .v4 .flag-row .bad { background: var(--red); color: #000; }

    /* ─────────────────────────────────────────────
       V11 · Trace + LLM-Native Hybrid (Honeycomb × Langfuse)
       ───────────────────────────────────────────── */
    .v11 {
      --bg-0: #0a1014;
      --bg-1: #0f1620;
      --bg-2: #161e2a;
      --bg-3: #1e2735;
      --line: #1d2738;
      --line2: #2a374b;
      --t-0: #e6ecf2;
      --t-1: #a8b3c4;
      --t-2: #6b7888;
      --t-3: #475266;
      --teal:   oklch(0.74 0.13 195);
      --indigo: oklch(0.70 0.14 270);
      --green:  oklch(0.74 0.16 145);
      --red:    oklch(0.70 0.18 25);
      --amber:  oklch(0.78 0.15 70);
      --pink:   oklch(0.72 0.16 340);
      --sans: "IBM Plex Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg-0); color: var(--t-0); font-family: var(--sans); font-size: 12px;
    }
    .v11 .topline { padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
    .v11 .brand { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 13px; }
    .v11 .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 10px var(--teal); }
    .v11 .meta { font-family: var(--mono); font-size: 10px; color: var(--t-2); }

    .v11 .section { padding: 12px 14px; }
    .v11 .sec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .v11 .sec-head .tag { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.06em; }
    .v11 .sec-head .tag.tr { background: oklch(0.30 0.08 195 / 0.4); color: var(--teal); border: 1px solid oklch(0.50 0.10 195 / 0.5); }

    /* trace waterfall */

    .v11 .span-row .bar.indigosp { background: var(--indigo); }

    .v11 .span-row .bar.ambersp  { background: var(--amber); }
    .v11 .span-row .bar.redsp    { background: var(--red); }
    .v11 .span-row .bar.pinksp   { background: var(--pink); }
    .v11 .span-row .bar .lbl { position: absolute; left: 100%; margin-left: 6px; font-family: var(--mono); font-size: 9px; color: var(--t-2); white-space: nowrap; line-height: 10px; }

    /* prompt/response split */
    .v11 .iosplit { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .v11 .iopane-head { padding: 6px 10px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px; background: var(--bg-2); border-radius: 4px 4px 0 0; }

    .v11 .iopane-head .role { font-family: var(--mono); font-size: 9px; padding: 1px 5px; border-radius: 2px; }
    .v11 .iopane-head .role.sys { color: var(--indigo); background: oklch(0.30 0.07 270 / 0.4); border: 1px solid oklch(0.50 0.10 270 / 0.5); }
    .v11 .iopane-head .role.res { color: var(--green); background: oklch(0.30 0.06 145 / 0.4); border: 1px solid oklch(0.50 0.10 145 / 0.5); }
    .v11 .iopane-head .ch { margin-left: auto; font-family: var(--mono); font-size: 9px; color: var(--t-3); }
    .v11 .iopane-body { padding: 10px 12px; font-family: var(--mono); font-size: 10px; color: var(--t-1); line-height: 1.55; flex: 1; overflow: hidden; }
    .v11 .iopane-body .hl-cache { background: oklch(0.32 0.07 340 / 0.35); border-bottom: 1px dashed var(--pink); }
    .v11 .iopane-body .hl-tool { background: oklch(0.30 0.08 195 / 0.3); color: var(--teal); padding: 0 2px; border-radius: 2px; }
    .v11 .iopane-body .key { color: var(--teal); }
    .v11 .iopane-body .str { color: oklch(0.78 0.10 145); }

    /* token receipt */
    .v11 .receipt { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; background: var(--line); border: 1px solid var(--line); gap: 1px; border-radius: 3px; }
    .v11 .receipt .cell { background: var(--bg-1); padding: 7px 10px; }
    .v11 .receipt .k { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--t-3); }
    .v11 .receipt .v { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--t-0); margin-top: 1px; }
    .v11 .receipt .v.teal { color: var(--teal); }
    .v11 .receipt .v.green { color: var(--green); }
    .v11 .receipt .v.pink { color: var(--pink); }
    .v11 .receipt .v.amber { color: var(--amber); }

    /* ─────────────────────────────────────────────
       V12 · DAG Pipeline (Dagster × ComfyUI)
       ───────────────────────────────────────────── */
    .v12 {
      --bg-0: #14171c;
      --bg-1: #1a1e25;
      --bg-2: #20252e;
      --bg-3: #2a313d;
      --line: #2b323f;
      --t-0: #e8ecf3;
      --t-1: #aab3c2;
      --t-2: #6c7689;
      --t-3: #4a5364;
      --teal:   oklch(0.74 0.13 195);
      --indigo: oklch(0.72 0.14 270);
      --green:  oklch(0.74 0.13 145);
      --amber:  oklch(0.78 0.14 70);
      --pink:   oklch(0.72 0.16 340);
      --red:    oklch(0.70 0.18 25);
      --sans: "IBM Plex Sans", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
      background: var(--bg-0); color: var(--t-0); font-family: var(--sans); font-size: 12px;
    }
    .v12 .topline { padding: 9px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); }
    .v12 .brand { font-weight: 600; font-size: 13px; display: flex; gap: 6px; align-items: center; }
    .v12 .brand-dot { width: 8px; height: 8px; background: var(--indigo); border-radius: 2px; transform: rotate(45deg); }
    .v12 .meta { font-family: var(--mono); font-size: 10px; color: var(--t-2); }

    .v12 .dag-canvas {
      position: relative;
      background:

        var(--bg-0);
      border-bottom: 1px solid var(--line);
      height: 380px;
      overflow: hidden;
    }
    .v12 .dag-canvas svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    .v12 .node {
      position: absolute;
      width: 138px;
      background: var(--bg-1);
      border: 1px solid var(--line);
      border-radius: 4px;

    .v12 .node.selected { border-color: var(--indigo); box-shadow: 0 0 0 1px var(--indigo), 0 4px 14px rgba(0,0,0,0.4); }
    .v12 .node-head {
      padding: 4px 8px;
      font-family: var(--mono); font-size: 10px; font-weight: 600;

      letter-spacing: 0.06em; text-transform: uppercase;

    }
    .v12 .node-head .dot { width: 5px; height: 5px; background: rgba(0,0,0,0.4); border-radius: 50%; }
    .v12 .node-head.teal   { background: var(--teal); }
    .v12 .node-head.green  { background: var(--green); }
    .v12 .node-head.amber  { background: var(--amber); }
    .v12 .node-head.indigo { background: var(--indigo); color: #f0e8ff; }
    .v12 .node-head.pink   { background: var(--pink); }
    .v12 .node-head.gray   { background: var(--bg-3); color: var(--t-1); }
    .v12 .node-body { padding: 8px 10px; }
    .v12 .node-body .title { font-size: 11px; color: var(--t-2); margin-bottom: 4px; }
    .v12 .node-body .metric { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--t-0); line-height: 1.1; }
    .v12 .node-body .metric.warn { color: var(--amber); }
    .v12 .node-body .metric .small { font-size: 10px; font-weight: 400; color: var(--t-2); margin-left: 4px; }
    .v12 .node-body .lat { font-family: var(--mono); font-size: 9px; color: var(--t-3); margin-top: 4px; display: flex; justify-content: space-between; }
    .v12 .node-port {
      position: absolute;
      width: 7px; height: 7px;
      background: var(--bg-0); border: 1.5px solid var(--t-2);
      border-radius: 50%;
      top: 50%; transform: translateY(-50%);
    }
    .v12 .node-port.in { left: -4px; }
    .v12 .node-port.out { right: -4px; }
    .v12 .node-port.live { border-color: var(--indigo); background: var(--indigo); }

    .v12 .edge-label {
      position: absolute;
      font-family: var(--mono); font-size: 9px;
      color: var(--t-2);
      background: var(--bg-0);
      padding: 1px 5px;
      border-radius: 2px;
      border: 1px solid var(--line);
      white-space: nowrap;
      transform: translate(-50%, -50%);
    }
    .v12 .edge-label.refine { color: var(--pink); border-color: oklch(0.5 0.12 340 / 0.6); }

    .v12 .legend { position: absolute; left: 12px; bottom: 12px; display: flex; gap: 10px; font-family: var(--mono); font-size: 9px; color: var(--t-2); background: var(--bg-1); padding: 4px 8px; border: 1px solid var(--line); border-radius: 3px; }
    .v12 .legend .swatch { width: 9px; height: 9px; display: inline-block; margin-right: 4px; vertical-align: middle; }

    .v12 .detail { padding: 12px 14px; border-top: 1px solid var(--line); background: var(--bg-1); }
    .v12 .detail-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .v12 .detail-head .tag { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 2px; background: var(--amber); color: #000; font-weight: 700; letter-spacing: 0.06em; }
    .v12 .detail-head h3 { margin: 0; font-size: 13px; font-weight: 600; }
    .v12 .detail-head .sub { font-size: 11px; color: var(--t-3); }
    .v12 .detail-head .r { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--t-2); display: flex; gap: 12px; }
    .v12 .detail-head .r .v { color: var(--t-0); }
    .v12 .iogrid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 3px; overflow: hidden; }
    .v12 .iogrid .cell { background: var(--bg-1); padding: 7px 10px; }
    .v12 .iogrid .k { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--t-3); }
    .v12 .iogrid .v { font-family: var(--mono); font-size: 13px; color: var(--t-0); margin-top: 2px; font-weight: 600; }
    .v12 .iogrid .v.amber { color: var(--amber); }
    .v12 .iogrid .v.green { color: var(--green); }
    .v12 .iogrid .v.pink { color: var(--pink); }

    /* ─────────────────────────────────────────────
       V13 · Explain Tree (Solr debugQuery × Chrome DevTools)
       ───────────────────────────────────────────── */
    .v13 {
      --bg-0: #0c0e12;
      --bg-1: #11141a;
      --bg-2: #161a21;
      --bg-hover: #1c2230;
      --line: #1d2230;
      --line2: #2a3142;
      --t-0: #d6dce6;
      --t-1: #9aa5b8;
      --t-2: #6a7588;
      --t-3: #475063;
      --t-4: #2f3645;
      --cyan:   oklch(0.78 0.10 200);
      --green:  oklch(0.76 0.14 145);
      --red:    oklch(0.70 0.18 25);
      --amber:  oklch(0.78 0.14 70);
      --violet: oklch(0.72 0.14 290);
      --pink:   oklch(0.72 0.16 340);
      --mono: "JetBrains Mono", ui-monospace, monospace;
      --sans: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--bg-0); color: var(--t-0); font-family: var(--mono); font-size: 11px;
    }
    .v13 .topline { padding: 7px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); background: var(--bg-1); }
    .v13 .brand { font-family: var(--sans); font-weight: 600; font-size: 13px; display: flex; gap: 6px; align-items: center; }
    .v13 .brand-dot { width: 7px; height: 7px; background: var(--cyan); transform: rotate(45deg); }
    .v13 .meta { color: var(--t-2); font-size: 10px; }

    .v13 .tabs { display: flex; background: var(--bg-1); border-bottom: 1px solid var(--line); padding: 0 4px; }
    .v13 .tabs button {
      background: transparent; border: 0; color: var(--t-2);
      padding: 6px 12px; font-family: var(--mono); font-size: 11px;
      border-bottom: 2px solid transparent; cursor: pointer;
      letter-spacing: 0.02em;
    }
    .v13 .tabs button.on { color: var(--cyan); border-bottom-color: var(--cyan); }
    .v13 .tabs button:hover { color: var(--t-0); }

    .v13 .group { padding: 4px 0; border-bottom: 1px solid var(--line); }
    .v13 .group-head {
      padding: 5px 10px;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-1); color: var(--t-2);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .v13 .group-head .r { color: var(--t-3); font-size: 10px; letter-spacing: 0; }

    /* tree row */
    .v13 .row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items: center;
      padding: 2px 10px 2px 0;
      line-height: 1.5;
      color: var(--t-1);
      cursor: default;
    }
    .v13 .row:hover { background: var(--bg-hover); }
    .v13 .row.sel { background: var(--bg-hover); }
    .v13 .row > .lbl { display: flex; align-items: center; min-width: 0; }
    .v13 .row .chev {
      display: inline-block;
      width: 12px; text-align: center;
      color: var(--t-3); flex-shrink: 0;
    }
    .v13 .row .chev.open  { color: var(--t-1); }
    .v13 .row .chev.leaf  { color: var(--t-4); }
    .v13 .row .indent { display: inline-block; flex-shrink: 0; border-left: 1px dotted var(--t-4); }
    .v13 .row .name { color: var(--t-0); }
    .v13 .row .name.dim { color: var(--t-2); }
    .v13 .row .name.green { color: var(--green); }
    .v13 .row .name.red { color: var(--red); }
    .v13 .row .name.cyan { color: var(--cyan); }
    .v13 .row .name.amber { color: var(--amber); }
    .v13 .row .name.violet { color: var(--violet); }
    .v13 .row .meta { color: var(--t-2); font-size: 10px; margin-left: 8px; }
    .v13 .row .formula { color: var(--t-3); font-size: 10px; text-align: right; }
    .v13 .row .formula .op { color: var(--t-4); }
    .v13 .row .formula .v { color: var(--t-1); }
    .v13 .row .delta { font-weight: 600; text-align: right; min-width: 56px; }
    .v13 .row .delta.pos { color: var(--green); }
    .v13 .row .delta.neg { color: var(--red); }
    .v13 .row .delta.muted { color: var(--t-2); font-weight: 400; }
    .v13 .row .count { color: var(--amber); text-align: right; min-width: 56px; }
    .v13 .row .count.muted { color: var(--t-2); }

    .v13 .row .badge {
      display: inline-block;
      padding: 0 5px; font-size: 9px; letter-spacing: 0.04em;
      margin-left: 6px; border-radius: 1px;
      font-family: var(--mono);
      text-transform: uppercase;
    }
    .v13 .row .badge.t1 { background: var(--bg-3); color: var(--cyan); border: 1px solid var(--line2); }
    .v13 .row .badge.violet { background: oklch(0.30 0.07 290 / 0.4); color: var(--violet); border: 1px solid oklch(0.50 0.10 290 / 0.5); }
    .v13 .row .badge.green { background: oklch(0.30 0.08 145 / 0.35); color: var(--green); border: 1px solid oklch(0.50 0.10 145 / 0.5); }

    .v13 .toolbar {
      display: flex; justify-content: space-between;
      padding: 4px 10px;
      background: var(--bg-1); border-bottom: 1px solid var(--line);
      color: var(--t-3); font-size: 10px;
    }
    .v13 .toolbar .actions { display: flex; gap: 8px; }
    .v13 .toolbar .actions button {
      background: transparent; border: 1px solid var(--line2);
      color: var(--t-1); padding: 1px 8px; font-family: var(--mono);
      font-size: 10px; cursor: pointer;
    }
    .v13 .toolbar .actions button:hover { background: var(--bg-2); }

    .v13 .status-strip {
      padding: 8px 12px; display: flex; align-items: center; gap: 12px;
      background: var(--bg-1); border-bottom: 1px solid var(--line);
    }
    .v13 .status-strip .b {
      background: var(--green); color: #000;
      padding: 2px 10px; font-weight: 700;
      font-size: 11px; letter-spacing: 0.08em;
    }
    .v13 .status-strip .kv { color: var(--t-2); font-size: 10px; }
    .v13 .status-strip .kv .v { color: var(--t-0); }
    .v13 .status-strip .kv .sep { color: var(--t-4); margin: 0 4px; }

  </style>
</head>

  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    // Shared mock data slice
    const FUNNEL = [

    // ── V1 Observability ─────────────────────────
    function V1() {
      return (
        <div className="v1 ab">

      { k: "oil_pen",    w: -0.12 },

    function rng(seed) {
      let s = seed;
      return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
    }
    function buildHeatRows(n) {
      const r = rng(17);
      const rows = [];
      for (let i = 0; i < n; i++) {
        const vals = HEAT_DIMS.map(() => Math.round((r() * 1.4 - 0.2) * 100) / 100);
        const total = vals.reduce((acc, v, j) => acc + v * HEAT_DIMS[j].w, 0) + (n - i) / n * 0.35;
        rows.push({ id: `cmb_${String(i+1).padStart(3, "0")}`, vals, total: Math.round(total * 1000) / 1000 });
      }
      rows.sort((a, b) => b.total - a.total);
      return rows;
    }
    function heatColor(v, w, palette) {
      const sign = w >= 0 ? 1 : -1;
      const eff = (v * sign - 0.3) / 0.9;
      const clamped = Math.max(-1, Math.min(1, eff));
      if (clamped >= 0) {
        return `oklch(0.30 ${0.08 + clamped * 0.12} ${palette.posHue} / ${0.18 + clamped * 0.65})`;
      } else {
        return `oklch(0.30 ${0.08 + (-clamped) * 0.10} ${palette.negHue} / ${0.18 + (-clamped) * 0.55})`;
      }
    }

      { name: "raw_combos",       value: 1842,  drop: 0,    pass: null,  color: "green" },
      { name: "price_filter",     value: 1207,  drop: 635,  pass: 65.5,  color: "green" },
    ];
    const L1_DROP_REASONS = [
      { r: "price > budget",       n: 2148, layer: "hard" },
      { r: "oil_level = high",     n: 1937, layer: "hard" },
      { r: "main = 加工肉",         n: 1024, layer: "hard" },
      { r: "protein_g < 12",       n: 814,  layer: "hard" },
      { r: "sweet_sauce = high",   n: 542,  layer: "hard" },
      { r: "main 重复 > 3 (多样性)", n: 644,  layer: "div" },
      { r: "combo > ¥80 (价格)",    n: 635,  layer: "price" },
    ];

    // ── V11 detail · L1 + L2 ──────────────────────
    function V11Detail() {
      const palette = { posHue: 195, negHue: 25, accent: "oklch(0.74 0.13 195)" };
      const heatRows = buildHeatRows(10);
      return (
        <div className="v11 ab" style={{ overflow: "hidden" }}>
          <div className="topline">
            <div className="brand"><span className="brand-dot"></span>chisha <span style={{ color: "var(--t-3)", fontFamily: "var(--mono)", fontSize: 10 }}>/ trace · L1 + L2 span detail</span></div>
            <div className="meta">click span row → detail pane swaps</div>
          </div>

          {/* L1 section */}
          <div className="section">
            <div className="sec-head">
              <span className="tag tr">L1</span>
              <h3>span detail · recall</h3>
              <span className="sub">11,123 dishes → 1,207 combos · log scale</span>
              <span className="r">194ms</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 8 }}>
              <div style={{ background: "var(--bg-1)", border: "1px solid var(--line)", borderRadius: 4, padding: "8px 10px" }}>
                {FUNNEL_FULL.map((f, i) => {
                  const pct = logPct(f.value, 11123);
                  const passW = i > 0 ? Math.round(f.value / FUNNEL_FULL[i-1].value * 100) : 100;
                  const tone = f.color === "green" ? "var(--green)" : f.color === "amber" ? "var(--amber)" : f.color === "teal" ? "var(--teal)" : "var(--indigo)";
                  return (
                    <div key={i} style={{ padding: "4px 0", borderTop: i>0 ? "1px solid var(--line)" : 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "var(--mono)", fontSize: 10 }}>
                        <span style={{ color: "var(--t-1)" }}>{f.name}</span>
                        <span style={{ color: "var(--t-0)", fontWeight: 600 }}>{f.value.toLocaleString()}</span>
                      </div>
                      <div style={{ height: 6, background: "var(--bg-2)", borderRadius: 1, marginTop: 2, overflow: "hidden" }}>
                        <div style={{ height: "100%", background: tone, width: `${pct}%` }}></div>
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "var(--mono)", fontSize: 9, color: "var(--t-3)", marginTop: 1 }}>
                        <span>{i > 0 ? `pass ${f.pass}%` : "baseline"}</span>
                        {f.drop > 0 && <span style={{ color: "var(--red)" }}>−{f.drop.toLocaleString()}</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ background: "var(--bg-1)", border: "1px solid var(--line)", borderRadius: 4, padding: "8px 10px" }}>
                <div style={{ fontFamily: "var(--mono)", fontSize: 9, color: "var(--t-3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>drop reasons · dish-level</div>
                {L1_DROP_REASONS.map((d, i) => {
                  const tot = L1_DROP_REASONS.reduce((a, b) => a + b.n, 0);
                  const pct = Math.round(d.n / tot * 100);
                  const tone = d.layer === "div" ? "var(--amber)" : d.layer === "price" ? "var(--indigo)" : "var(--red)";
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "100px 1fr 44px", gap: 6, alignItems: "center", padding: "2px 0", fontFamily: "var(--mono)", fontSize: 10 }}>
                      <span style={{ color: "var(--t-1)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.r}</span>
                      <div style={{ height: 5, background: "var(--bg-2)", borderRadius: 1, overflow: "hidden" }}>
                        <div style={{ height: "100%", background: tone, width: `${pct}%` }}></div>
                      </div>
                      <span style={{ color: "var(--t-0)", textAlign: "right" }}>{d.n.toLocaleString()}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* L2 section */}
          <div className="section" style={{ paddingTop: 0 }}>
            <div className="sec-head">
              <span className="tag tr" style={{ background: "oklch(0.30 0.08 145 / 0.4)", color: "var(--green)", borderColor: "oklch(0.50 0.10 145 / 0.5)" }}>L2</span>
              <h3>span detail · score_v2</h3>
              <span className="sub">12 dims × 4 caps · top 10 of 60</span>
              <span className="r">38ms</span>
            </div>
            <div className="receipt" style={{ marginBottom: 8 }}>
              <div className="cell"><div className="k">score range</div><div className="v">0.18 → 1.19</div></div>
              <div className="cell"><div className="k">cap K</div><div className="v teal">4</div></div>
              <div className="cell"><div className="k">brand_top_k</div><div className="v teal">3</div></div>
              <div className="cell"><div className="k">rest 前→后</div><div className="v amber">84→31</div></div>
              <div className="cell"><div className="k">单店 max</div><div className="v">11→3</div></div>
            </div>
            <div style={{ background: "var(--bg-1)", border: "1px solid var(--line)", borderRadius: 4, padding: 8, overflow: "auto" }}>
              <Heatmap rows={heatRows} palette={palette} />
            </div>
          </div>
        </div>
      );
    }

    // ── V12 detail · L1 + L2 ──────────────────────
    function V12Detail() {
      const palette = { posHue: 270, negHue: 25, accent: "oklch(0.72 0.14 270)" };
      const heatRows = buildHeatRows(10);
      return (
        <div className="v12 ab" style={{ overflow: "hidden" }}>
          <div className="topline">
            <div className="brand"><span className="brand-dot"></span>chisha <span style={{ color: "var(--t-3)", fontFamily: "var(--mono)", fontSize: 10 }}>/ pipeline · L1 + L2 节点详情</span></div>
            <div className="meta">点 DAG 节点 → 下面面板切换</div>
          </div>

          {/* mini DAG strip showing which node is selected */}
          <div style={{ padding: "10px 14px", borderBottom: "1px solid var(--line)", display: "flex", alignItems: "center", gap: 6, background: "var(--bg-1)" }}>
            {[
              { name: "CTX", tone: "gray" },
              { name: "L1",  tone: "teal", sel: true },
              { name: "L2",  tone: "green", sel: true },
              { name: "L3",  tone: "amber" },
              { name: "FIN", tone: "indigo" },
            ].map((n, i) => (
              <React.Fragment key={i}>
                {i > 0 && <span style={{ color: "var(--t-3)" }}>→</span>}
                <span style={{
                  padding: "3px 10px", fontFamily: "var(--mono)", fontSize: 10, fontWeight: 700,
                  background: n.sel ? `var(--${n.tone})` : "var(--bg-2)",
                  color: n.sel ? "#000" : "var(--t-2)",
                  letterSpacing: "0.06em",
                  border: n.sel ? `1px solid var(--${n.tone})` : "1px solid var(--line)",
                  borderRadius: 2,
                }}>{n.name}</span>
              </React.Fragment>
            ))}
            <span style={{ marginLeft: "auto", fontFamily: "var(--mono)", fontSize: 10, color: "var(--t-3)" }}>
              shift+点击 多选 · 两个节点同时展开
            </span>
          </div>

          {/* L1 detail card (Dagster-style) */}
          <div className="detail" style={{ borderTop: 0 }}>
            <div className="detail-head">
              <span className="tag" style={{ background: "var(--teal)", color: "#000" }}>L1</span>
              <h3>recall · 节点详情</h3>
              <span className="sub">11,123 dishes → 1,207 combos</span>
              <div className="r">
                <span>latency <span className="v">194ms</span></span>
                <span>drop <span className="v" style={{ color: "var(--red)" }}>9,916</span></span>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 10 }}>
              <div>
                {FUNNEL_FULL.map((f, i) => {
                  const pct = logPct(f.value, 11123);
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "110px 1fr 50px 56px", gap: 8, alignItems: "center", padding: "3px 0", fontFamily: "var(--mono)", fontSize: 10, borderTop: i>0 ? "1px solid var(--line)" : 0 }}>
                      <span style={{ color: "var(--t-1)", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.04em" }}>{f.name}</span>
                      <div style={{ height: 8, background: "var(--bg-2)", border: "1px solid var(--line)" }}>
                        <div style={{ height: "100%", background: "var(--teal)", width: `${pct}%` }}></div>
                      </div>
                      <span style={{ color: "var(--amber)", textAlign: "right", fontWeight: 600 }}>{f.value.toLocaleString()}</span>
                      <span style={{ color: i > 0 ? "var(--green)" : "var(--t-3)", textAlign: "right" }}>{i > 0 ? `${f.pass}%` : "100%"}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{ background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 3, padding: "6px 10px" }}>
                <div style={{ fontFamily: "var(--mono)", fontSize: 9, color: "var(--t-3)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>top drop reasons</div>
                {L1_DROP_REASONS.slice(0, 5).map((d, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr auto", padding: "2px 0", fontFamily: "var(--mono)", fontSize: 10, color: "var(--t-1)" }}>
                    <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.r}</span>
                    <span style={{ color: "var(--red)" }}>−{d.n.toLocaleString()}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* L2 detail card */}
          <div className="detail">
            <div className="detail-head">
              <span className="tag" style={{ background: "var(--green)", color: "#000" }}>L2</span>
              <h3>score_v2 · 节点详情</h3>
              <span className="sub">12 维加权 + 4 层 cap</span>
              <div className="r">
                <span>latency <span className="v">38ms</span></span>
                <span>top60 <span className="v">31 rest</span></span>
              </div>
            </div>
            <div className="iogrid" style={{ marginBottom: 8 }}>
              <div className="cell"><div className="k">score min→max</div><div className="v amber">0.18 → 1.19</div></div>
              <div className="cell"><div className="k">cap K</div><div className="v green">4</div></div>
              <div className="cell"><div className="k">rest 前→后</div><div className="v">84→31</div></div>
              <div className="cell"><div className="k">单店 max</div><div className="v pink">11→3</div></div>
            </div>
            <div style={{ background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 3, padding: 6, overflow: "auto" }}>
              <Heatmap rows={heatRows} palette={palette} />
            </div>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="styles" title="chisha debug · style options" subtitle="7 directions — V11/V12 多出一个 artboard 补上 L1/L2 detail">
            <DCArtboard id="v11"  label="V11 · Trace · L3 detail (prompt/response)" width={780} height={780}><V11 /></DCArtboard>
            <DCArtboard id="v11d" label="V11 · Trace · L1 + L2 detail" width={780} height={820}><V11Detail /></DCArtboard>
            <DCArtboard id="v12"  label="V12 · DAG · L3 detail" width={780} height={780}><V12 /></DCArtboard>
            <DCArtboard id="v12d" label="V12 · DAG · L1 + L2 detail" width={780} height={820}><V12Detail /></DCArtboard>
            <DCArtboard id="v13" label="V13 · Explain Tree (L1 + L2 + L3 全部是树)" width={780} height={820}><V13 /></DCArtboard>
            <DCArtboard id="v1" label="V1 · Observability" width={720} height={780}><V1 /></DCArtboard>
            <DCArtboard id="v2" label="V2 · Terminal / k9s" width={720} height={780}><V2 /></DCArtboard>
            <DCArtboard id="v3" label="V3 · Editorial · 暖灰 + 衬线" width={720} height={780}><V3 /></DCArtboard>
            <DCArtboard id="v4" label="V4 · Bloomberg / 交易台" width={720} height={780}><V4 /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
