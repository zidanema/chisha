<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>chisha 推荐调试台</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel2: #1c2230;
    --border: #2a3142;
    --fg: #e6e9ef;
    --fg-dim: #8b94a5;
    --accent: #6ea8ff;
    --green: #5dd39e;
    --red: #ff6b6b;
    --orange: #ffb454;
    --yellow: #ffd86e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--fg);
    font-size: 13px; line-height: 1.5;
  }
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: 100vh;
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px;
  }
  .sidebar h2 {
    font-size: 14px; margin: 4px 0 12px;
    color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  .sidebar h3 {
    font-size: 12px; margin: 16px 0 6px;
    color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.05em;
  }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field label { font-size: 11px; color: var(--fg-dim); }
  select, input[type=text], input[type=number], input[type=date], textarea {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 6px 8px;
    border-radius: 4px;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12px;
  }
  textarea { resize: vertical; min-height: 70px; }
  button {
    background: var(--accent);
    color: #0a1020;
    border: none;
    padding: 8px 12px;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
  }
  .btn-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .toggle-row { display: flex; align-items: center; gap: 6px; }
  .toggle-row input[type=checkbox] { margin: 0; }

  .main {
    overflow-y: auto;
    padding: 16px 20px;
  }
  .status-bar {
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 12px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 12px;
  }
  .status-bar .k { color: var(--fg-dim); margin-right: 4px; }
  .status-bar .v { color: var(--fg); }
  .status-bar .badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px;
  }
  .badge-green { background: rgba(93, 211, 158, 0.15); color: var(--green); }
  .badge-red { background: rgba(255, 107, 107, 0.15); color: var(--red); }
  .badge-orange { background: rgba(255, 180, 84, 0.15); color: var(--orange); }
  .badge-grey { background: var(--panel2); color: var(--fg-dim); }

  .section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
  }
  .section-header {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .section-header:hover { background: var(--panel2); }
  .section-title { font-weight: 600; font-size: 14px; }
  .section-title .label { color: var(--accent); margin-right: 8px; }
  .section-summary { color: var(--fg-dim); font-size: 12px; font-family: ui-monospace, "SF Mono", Consolas, monospace; }
  .section-body { padding: 0 14px 14px; display: none; }
  .section.open .section-body { display: block; }
  .section.open .section-header { border-bottom: 1px solid var(--border); }
  .arrow { transition: transform 0.15s; }
  .section.open .arrow { transform: rotate(90deg); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 11.5px;
    margin-top: 8px;
  }
  th, td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  th { color: var(--fg-dim); font-weight: 500; }
  tr:hover td { background: rgba(110, 168, 255, 0.05); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.pos { color: var(--green); }
  td.neg { color: var(--red); }
  td.zero { color: var(--fg-dim); }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .stat {
    background: var(--panel2);
    border-radius: 4px;
    padding: 8px 10px;
  }
  .stat .k { color: var(--fg-dim); font-size: 11px; }
  .stat .v {
    color: var(--fg); font-size: 18px;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-variant-numeric: tabular-nums;
  }

  details > summary {
    cursor: pointer; padding: 4px 0;
    color: var(--fg-dim); font-size: 11px;
    user-select: none;
  }
  details > summary:hover { color: var(--fg); }
  details pre {
    background: #0a0d13;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-size: 11px;
    overflow-x: auto;
    max-height: 480px;
    overflow-y: auto;
    color: #c9d1d9;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
    margin-bottom: 10px;
  }
  .card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .card.explore { border-color: var(--orange); }
  .card .rank {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    background: var(--accent); color: #0a1020;
    font-weight: 700; margin-right: 6px;
  }
  .card.explore .rank { background: var(--orange); }
  .card .rest-name { font-size: 13px; font-weight: 600; margin: 4px 0; }
  .card .dishes { font-size: 12px; color: var(--fg-dim); margin-bottom: 6px; }
  .card .meta { font-size: 11px; color: var(--fg-dim); font-family: ui-monospace, monospace; }
  .card .reason {
    margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
    color: var(--fg); font-size: 12px;
  }
  .card .flags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
  .flag { font-size: 10.5px; padding: 1px 5px; border-radius: 2px; }
  .flag.ok { background: rgba(93, 211, 158, 0.15); color: var(--green); }
  .flag.warn { background: rgba(255, 107, 107, 0.15); color: var(--red); }

  .mood-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 10px;
  }
  .mood-col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
  }
  .mood-col h4 {
    margin: 0 0 8px;
    font-size: 13px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .breakdown-row {
    display: grid;
    grid-template-columns: 1fr auto;
    column-gap: 12px;
    padding: 2px 0;
    font-size: 11px;
    font-family: ui-monospace, monospace;
  }
  .breakdown-row .name { color: var(--fg-dim); }
  .breakdown-row .val { font-variant-numeric: tabular-nums; }

  .loading { color: var(--fg-dim); padding: 24px 0; text-align: center; }
  .error {
    color: var(--red);
    background: rgba(255, 107, 107, 0.08);
    border: 1px solid var(--red);
    padding: 10px; border-radius: 4px;
    margin-bottom: 12px;
    font-family: ui-monospace, monospace;
    white-space: pre-wrap;
  }
  pre.json-inline {
    margin: 0; font-size: 11px;
    background: #0a0d13; border-radius: 4px;
    padding: 8px; overflow-x: auto;
    max-height: 320px; overflow-y: auto;
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>调试台 · V2 &nbsp;<a href="/docs" target="_blank" style="float: right; font-size: 11px; color: var(--accent); text-decoration: none; font-weight: normal;">逻辑说明 →</a></h2>

    <div class="field">
      <label>餐次</label>
      <select id="meal-type">
        <option value="lunch">lunch (午餐)</option>
        <option value="dinner">dinner (晚餐)</option>
      </select>
    </div>

    <div class="field">
      <label>当日 mood (daily_mood)</label>
      <select id="daily-mood">
        <option value="">none (跳过)</option>
        <option value="want_light">want_light · 想清淡</option>
        <option value="want_indulgent">want_indulgent · 想爽</option>
        <option value="want_soup">want_soup · 想喝汤</option>
        <option value="low_carb">low_carb · 主食少</option>
        <option value="want_clean">want_clean · 不要重口</option>
        <option value="neutral">neutral · 默认</option>
      </select>
    </div>

    <div class="field">
      <label>today (默认今天)</label>
      <input type="date" id="today">
    </div>

    <div class="field toggle-row">
      <input type="checkbox" id="use-llm" checked>
      <label for="use-llm">使用 LLM 精排 (auto = 看 API key)</label>
    </div>

    <h3>profile 临时覆盖 (JSON)</h3>
    <div class="field">
      <textarea id="profile-overrides" placeholder='例如：&#10;{&#10;  "scoring_weights": {"low_oil": 2.0},&#10;  "plate_rule": {"min_protein_g": 30}&#10;}'></textarea>
      <button class="secondary" id="btn-show-profile" style="font-size: 11px; padding: 4px 8px; align-self: flex-start;">查看当前 profile</button>
    </div>

    <h3>combo 追溯 (可选)</h3>
    <div class="field">
      <label>餐厅名 (模糊)</label>
      <input type="text" id="trace-rest" placeholder="如 太二">
    </div>
    <div class="field">
      <label>菜名 (空格分隔, 模糊)</label>
      <input type="text" id="trace-dish" placeholder="如 酸菜鱼 西兰花">
    </div>

    <div class="btn-row">
      <button id="btn-run">触发推荐</button>
      <button class="secondary" id="btn-trace">追溯</button>
      <button class="secondary" id="btn-compare">mood 三栏对比</button>
    </div>
    <div class="btn-row">
      <button class="secondary" id="btn-clear" style="font-size: 11px; padding: 4px 8px;">清空</button>
    </div>

    <h3>提示</h3>
    <div style="color: var(--fg-dim); font-size: 11px; line-height: 1.6;">
      <strong>触发推荐</strong>：跑一次完整 V2 管道，展示 L1/L2/L3/Final<br>
      <strong>追溯</strong>：填餐厅/菜名后点击，看它在管道哪一步被丢/排第几<br>
      <strong>mood 对比</strong>：同一输入下跑 want_light/want_soup/want_indulgent 三组
    </div>
  </aside>

  <main class="main">
    <div id="status" class="status-bar" style="display: none;"></div>
    <div id="error" class="error" style="display: none;"></div>
    <div id="loading" class="loading" style="display: none;">推荐中... (跑 LLM 时大概需要 5-15 秒)</div>
    <div id="result"></div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);

function setLoading(on) {
  $('loading').style.display = on ? 'block' : 'none';
  $('btn-run').disabled = on;
  $('btn-trace').disabled = on;
  $('btn-compare').disabled = on;
}

function showError(msg) {
  $('error').style.display = 'block';
  $('error').textContent = msg;
}

function clearOutput() {
  $('result').innerHTML = '';
  $('status').style.display = 'none';
  $('error').style.display = 'none';
}

function getOverrides() {
  const t = $('profile-overrides').value.trim();
  if (!t) return null;
  try { return JSON.parse(t); }
  catch (e) {
    throw new Error('profile_overrides 不是合法 JSON: ' + e.message);
  }
}

function getCommonReq(includeTrace = false) {
  const req = {
    meal_type: $('meal-type').value,
    daily_mood: $('daily-mood').value || null,
    today: $('today').value || null,
    use_llm_rerank: $('use-llm').checked,
    profile_overrides: getOverrides(),
  };
  if (includeTrace) {
    const rest = $('trace-rest').value.trim();
    const dishStr = $('trace-dish').value.trim();
    if (rest || dishStr) {
      req.trace_target = {
        restaurant_name: rest,
        dish_names: dishStr ? dishStr.split(/\s+/) : [],
      };
    }
  }
  return req;
}

async function postJson(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`HTTP ${r.status}: ${t}`);
  }
  return r.json();
}

// ---------- 渲染 ----------

function renderStatus(cfg) {
  const el = $('status');
  el.style.display = 'flex';
  const fb = cfg.fallback_used
    ? '<span class="badge badge-orange">fallback</span>'
    : '<span class="badge badge-green">LLM</span>';
  el.innerHTML = `
    <span><span class="k">meal:</span><span class="v">${cfg.meal_type}</span></span>
    <span><span class="k">zone:</span><span class="v">${cfg.zone}</span></span>
    <span><span class="k">today:</span><span class="v">${cfg.today}</span></span>
    <span><span class="k">mood:</span><span class="v">${cfg.daily_mood || '—'}</span></span>
    <span><span class="k">version:</span><span class="v">${cfg.version}</span></span>
    <span><span class="k">rerank:</span>${fb}</span>
    ${Object.keys(cfg.profile_overrides || {}).length
      ? `<span><span class="k">overrides:</span><span class="badge badge-grey">${Object.keys(cfg.profile_overrides).join(',')}</span></span>` : ''}
  `;
}

function sectionEl(label, title, summary, openByDefault = false) {
  const sec = document.createElement('section');
  sec.className = 'section' + (openByDefault ? ' open' : '');
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <div class="section-title">
      <span class="arrow">▶</span> <span class="label">${label}</span> ${title}
    </div>
    <div class="section-summary">${summary}</div>`;
  header.onclick = () => sec.classList.toggle('open');
  const body = document.createElement('div');
  body.className = 'section-body';
  sec.appendChild(header);
  sec.appendChild(body);
  return {sec, body};
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function jsonBlock(label, obj) {
  return `
    <details>
      <summary>${label}</summary>
      <pre>${escapeHtml(JSON.stringify(obj, null, 2))}</pre>
    </details>`;
}

function renderL1(l1, container) {
  const s = l1.summary;
  const params = l1.params;
  const stats = document.createElement('div');
  stats.className = 'stat-grid';
  stats.innerHTML = `
    <div class="stat"><div class="k">全量菜</div><div class="v">${s.total_dishes}</div></div>
    <div class="stat"><div class="k">餐厅数</div><div class="v">${s.total_restaurants}</div></div>
    <div class="stat" title="D-041: ETA > hard_max_eta_min"><div class="k">ban·ETA 超限</div><div class="v">${s.n_banned_rests_by_eta ?? 0}</div></div>
    <div class="stat" title="D-041: avoid_restaurants 名字模糊匹配"><div class="k">ban·avoid 名字</div><div class="v">${s.n_banned_rests_by_name ?? 0}</div></div>
    <div class="stat" title="近 7 天吃过"><div class="k">ban·近期吃过</div><div class="v">${s.n_diversity_avoid_rests ?? s.n_avoid_rests ?? 0}</div></div>
    <div class="stat"><div class="k">hard_filter 后菜</div><div class="v">${s.after_hard_filter}</div></div>
    <div class="stat"><div class="k">diversity 后菜</div><div class="v">${s.after_diversity_filter}</div></div>
    <div class="stat"><div class="k">出 combo 餐厅</div><div class="v">${s.n_restaurants_with_combos}</div></div>
    <div class="stat"><div class="k">combos (价过滤前)</div><div class="v">${s.n_combos_before_price_filter ?? s.n_combos}</div></div>
    <div class="stat" title="D-041: combo 总价 > hard_max_{lunch,dinner}"><div class="k">drop·价超限</div><div class="v">${s.n_combos_dropped_by_price ?? 0}</div></div>
    <div class="stat" style="background: rgba(110, 168, 255, 0.12);"><div class="k">最终 combos</div><div class="v">${s.n_combos}</div></div>
  `;
  container.appendChild(stats);

  // 丢弃原因聚合
  const hardReason = Object.entries(l1.dropped_hard_by_reason || {});
  const divReason = Object.entries(l1.dropped_diversity_by_reason || {});
  let html = `
    <h4 style="margin: 14px 0 6px; font-size: 12px; color: var(--fg-dim);">硬过滤丢弃原因聚合 (菜级)</h4>
    <table>
      <thead><tr><th>原因 (数值→N)</th><th class="num">条数</th></tr></thead>
      <tbody>${hardReason.length
        ? hardReason.map(([r, n]) => `<tr><td>${escapeHtml(r)}</td><td class="num">${n}</td></tr>`).join('')
        : '<tr><td colspan="2" style="color: var(--fg-dim);">无</td></tr>'}</tbody>
    </table>`;

  // D-041: 餐厅级 ban 明细
  const banRests = l1.banned_restaurants || [];
  if (banRests.length) {
    html += `
      <h4 style="margin: 14px 0 6px; font-size: 12px; color: var(--fg-dim);">餐厅级 ban 明细 · ${banRests.length} 家 (D-041)</h4>
      <table>
        <thead><tr><th>餐厅</th><th>原因</th></tr></thead>
        <tbody>${banRests.slice(0, 50).map(r =>
          `<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.reason)}</td></tr>`
        ).join('')}${banRests.length > 50 ? `<tr><td colspan="2" style="color: var(--fg-dim);">... +${banRests.length - 50} 条</td></tr>` : ''}</tbody>
      </table>`;
  }

  html += `
    <h4 style="margin: 14px 0 6px; font-size: 12px; color: var(--fg-dim);">多样性丢弃原因聚合 (菜级)</h4>
    <table>
      <thead><tr><th>原因</th><th class="num">条数</th></tr></thead>
      <tbody>${divReason.length
        ? divReason.map(([r, n]) => `<tr><td>${escapeHtml(r)}</td><td class="num">${n}</td></tr>`).join('')
        : '<tr><td colspan="2" style="color: var(--fg-dim);">无</td></tr>'}</tbody>
    </table>`;

  // D-041: combo 价格丢弃 sample
  const priceDrop = l1.dropped_by_price || [];
  if (priceDrop.length) {
    html += `
      <h4 style="margin: 14px 0 6px; font-size: 12px; color: var(--fg-dim);">combo 价格硬过滤 · ${priceDrop.length} 个 combo 被丢 (D-041, 展示前 20)</h4>
      <table>
        <thead><tr><th>combo</th><th class="num">总价</th><th>原因</th></tr></thead>
        <tbody>${priceDrop.slice(0, 20).map(c =>
          `<tr><td>${escapeHtml(c.restaurant)} | ${escapeHtml((c.dishes||[]).join('+'))}</td><td class="num">${c.total_price}</td><td>${escapeHtml(c.reason)}</td></tr>`
        ).join('')}</tbody>
      </table>`;
  }

  html += `
    <h4 style="margin: 14px 0 6px; font-size: 12px; color: var(--fg-dim);">餐厅出 combo 数 top 20</h4>
    <table>
      <thead><tr><th>餐厅</th><th class="num">过滤后菜数</th><th class="num">combos</th></tr></thead>
      <tbody>${(l1.per_restaurant || []).slice(0, 20).map(r =>
        `<tr><td>${escapeHtml(r.name)}</td><td class="num">${r.n_dishes_after_filter}</td><td class="num">${r.n_combos}</td></tr>`
      ).join('')}</tbody>
    </table>
  `;
  const div = document.createElement('div');
  div.innerHTML = html;
  container.appendChild(div);

  const raw = document.createElement('div');
  raw.style.marginTop = '12px';
  raw.innerHTML = `
    ${jsonBlock('召回参数 (params)', params)}
    ${jsonBlock(`硬过滤丢弃明细 (${(l1.dropped_hard||[]).length} 条)`, l1.dropped_hard)}
    ${jsonBlock(`多样性丢弃明细 (${(l1.dropped_diversity||[]).length} 条)`, l1.dropped_diversity)}
    ${jsonBlock(`combo 价格丢弃明细 (${priceDrop.length} 条)`, priceDrop)}
    ${jsonBlock(`餐厅级 ban 明细 (${banRests.length} 家)`, banRests)}
  `;
  container.appendChild(raw);
}

function renderL2(l2, container) {
  const s = l2.summary;
  const stats = document.createElement('div');
  stats.className = 'stat-grid';
  const capK = (s.per_restaurant_cap_k != null) ? s.per_restaurant_cap_k : '-';
  const uniqBefore = s.top30_unique_restaurants_before_cap;
  const uniqAfter = s.top30_unique_restaurants_after_cap;
  const maxBefore = s.top30_max_per_restaurant_before_cap;
  const maxAfter = s.top30_max_per_restaurant_after_cap;
  const capChanged = (uniqBefore != null && uniqAfter != null && uniqBefore !== uniqAfter);
  const capColor = capChanged ? 'var(--accent)' : 'inherit';
  stats.innerHTML = `
    <div class="stat"><div class="k">打分 combo 数</div><div class="v">${s.n_scored}</div></div>
    <div class="stat"><div class="k">score min</div><div class="v">${s.score_min}</div></div>
    <div class="stat"><div class="k">score max</div><div class="v">${s.score_max}</div></div>
    <div class="stat"><div class="k">per-rest cap K</div><div class="v">${capK}</div></div>
    <div class="stat" title="cap 前/后 top30 涉及的不同餐厅数"><div class="k">top30 餐厅数</div><div class="v" style="color: ${capColor};">${uniqBefore ?? '-'} → ${uniqAfter ?? '-'}</div></div>
    <div class="stat" title="cap 前/后 top30 中单家餐厅最多 combo 数"><div class="k">单店最多 combo</div><div class="v">${maxBefore ?? '-'} → ${maxAfter ?? '-'}</div></div>
  `;
  container.appendChild(stats);

  // 权重展示
  const weightsHtml = Object.entries(s.weights || {}).map(([k, v]) =>
    `<span class="badge badge-grey" style="margin-right: 4px; font-family: monospace;">${escapeHtml(k)}=${v}</span>`
  ).join('');
  const wdiv = document.createElement('div');
  wdiv.style.cssText = 'margin: 8px 0; line-height: 1.9; font-size: 11px;';
  wdiv.innerHTML = `<span style="color: var(--fg-dim);">权重:</span> ${weightsHtml}`;
  container.appendChild(wdiv);

  // top 30 表格
  const tableWrap = document.createElement('div');
  tableWrap.innerHTML = `
    <h4 style="margin: 12px 0 6px; font-size: 12px; color: var(--fg-dim);">top 30 (点 rank 展开 breakdown)</h4>
    <table id="l2-table">
      <thead>
        <tr>
          <th>#</th>
          <th>combo</th>
          <th>菜系</th>
          <th class="num">价</th>
          <th class="num">距离</th>
          <th class="num">ETA</th>
          <th class="num">score</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  `;
  container.appendChild(tableWrap);
  const tbody = tableWrap.querySelector('tbody');
  (l2.top || []).forEach((c, i) => {
    const row = document.createElement('tr');
    row.style.cursor = 'pointer';
    row.innerHTML = `
      <td>${c.rank}</td>
      <td>${escapeHtml(c.signature)}</td>
      <td>${escapeHtml(c.cuisine || '')}</td>
      <td class="num">${c.total_price}</td>
      <td class="num">${c.distance_m}</td>
      <td class="num">${c.eta_min}</td>
      <td class="num">${c.score}</td>
    `;
    const detail = document.createElement('tr');
    detail.style.display = 'none';
    const td = document.createElement('td');
    td.colSpan = 7;
    td.style.background = '#0a0d13';
    td.style.padding = '10px 14px';
    const breakdownRows = Object.entries(c.breakdown || {})
      .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]))
      .map(([k, v]) => {
        const cls = v > 0.01 ? 'pos' : (v < -0.01 ? 'neg' : 'zero');
        return `<div class="breakdown-row"><span class="name">${escapeHtml(k)}</span><span class="val ${cls}">${v >= 0 ? '+' : ''}${v}</span></div>`;
      }).join('');
    const dishesHtml = (c.dishes || []).map(d => `
      <div style="margin: 4px 0; font-size: 11px;">
        <strong>${escapeHtml(d.name)}</strong>
        <span style="color: var(--fg-dim);">¥${d.price} · ${d.main_ingredient_type||'?'} · ${d.cooking_method||'?'} · 油${d.oil_level} · 辣${d.spicy_level} · role=${d.dish_role||'?'} · wet=${d.wetness||'?'} · sweet=${d.sweet_sauce_level||'?'} · grain=${d.grain_type||'-'} · 蛋白${d.protein_g}g</span>
      </div>
    `).join('');
    td.innerHTML = `
      <div style="display: grid; grid-template-columns: 1fr 280px; gap: 16px;">
        <div>${dishesHtml}</div>
        <div>${breakdownRows}</div>
      </div>
    `;
    detail.appendChild(td);
    row.onclick = () => {
      detail.style.display = detail.style.display === 'none' ? '' : 'none';
    };
    tbody.appendChild(row);
    tbody.appendChild(detail);
  });

  const raw = document.createElement('div');
  raw.style.marginTop = '12px';
  raw.innerHTML = jsonBlock('top 30 raw JSON', l2.top);
  container.appendChild(raw);
}

function renderL3(l3, container) {
  const llm = l3.llm || {};
  const stats = document.createElement('div');
  stats.className = 'stat-grid';
  let llmBadge;
  if (!llm.used) {
    llmBadge = `<span class="badge badge-grey">未调用</span>`;
  } else if (llm.parsed_candidates) {
    llmBadge = `<span class="badge badge-green">成功</span>`;
  } else {
    llmBadge = `<span class="badge badge-red">失败/fallback</span>`;
  }
  stats.innerHTML = `
    <div class="stat"><div class="k">LLM 状态</div><div class="v" style="font-size: 14px;">${llmBadge}</div></div>
    <div class="stat"><div class="k">model</div><div class="v" style="font-size: 14px;">${llm.model || 'default'}</div></div>
    <div class="stat"><div class="k">prompt 字符</div><div class="v">${llm.prompt_chars || 0}</div></div>
    <div class="stat"><div class="k">response 字符</div><div class="v">${llm.raw_response_chars || 0}</div></div>
    <div class="stat"><div class="k">返回数</div><div class="v">${l3.n_returned}</div></div>
  `;
  container.appendChild(stats);

  if (llm.skipped_reason) {
    const div = document.createElement('div');
    div.style.cssText = 'color: var(--fg-dim); font-size: 12px; margin: 8px 0;';
    div.textContent = '跳过原因: ' + llm.skipped_reason;
    container.appendChild(div);
  }
  if (llm.fallback_reason) {
    const div = document.createElement('div');
    div.style.cssText = 'color: var(--orange); font-size: 12px; margin: 8px 0;';
    div.textContent = 'fallback 原因: ' + llm.fallback_reason;
    container.appendChild(div);
  }

  const raw = document.createElement('div');
  raw.style.marginTop = '12px';
  raw.innerHTML = `
    ${jsonBlock('LLM payload (送给模型的)', l3.payload_to_llm)}
    ${llm.raw_response ? `<details><summary>LLM 原始返回 (${llm.raw_response_chars} 字符)</summary><pre>${escapeHtml(llm.raw_response)}</pre></details>` : ''}
    ${llm.parsed_candidates ? jsonBlock(`LLM 解析后 candidates (${llm.parsed_candidates.length} 条)`, llm.parsed_candidates) : ''}
  `;
  container.appendChild(raw);
}

function renderFinal(final, container) {
  const grid = document.createElement('div');
  grid.className = 'card-grid';
  final.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card' + (c.is_explore ? ' explore' : '');
    const dishesText = c.dishes.map(d => `${d.name} ¥${d.price}`).join(' · ');
    const flagsHtml = Object.entries(c.health_flags || {}).map(([k, v]) => {
      // 正面键 (veg_ok/protein_ok/oil_ok/wetness) — true 是 ok
      // 负面键 (processed_meat/sweet_sauce) — true 是 warn
      const posKey = ['veg_ok', 'protein_ok', 'oil_ok', 'wetness'].includes(k);
      const isOk = posKey ? v === true : v === false;
      return `<span class="flag ${isOk ? 'ok' : 'warn'}">${escapeHtml(k)}=${v}</span>`;
    }).join('');
    const riskFlags = (c.risk_flags || []).map(r => `<span class="flag warn">⚠ ${escapeHtml(r)}</span>`).join('');
    card.innerHTML = `
      <div>
        <span class="rank">${c.rank}</span>
        ${c.is_explore ? '<span class="badge badge-orange">explore</span>' : '<span class="badge badge-green">exploit</span>'}
        <span style="float: right; font-family: monospace; color: var(--fg-dim);">score=${c.score}${c.fit_score != null ? ' fit=' + c.fit_score : ''}</span>
      </div>
      <div class="rest-name">${escapeHtml(c.restaurant.name)}</div>
      <div class="meta">${c.restaurant.distance_m}m · ${c.restaurant.eta_min}min · ¥${c.total_price}</div>
      <div class="dishes">${escapeHtml(dishesText)}</div>
      <div class="flags">${flagsHtml}${riskFlags}</div>
      <div class="reason">${escapeHtml(c.one_line_reason || '—')}</div>
    `;
    grid.appendChild(card);
  });
  container.appendChild(grid);
  const raw = document.createElement('div');
  raw.innerHTML = jsonBlock('final raw JSON', final);
  container.appendChild(raw);
}

function renderTarget(t, container) {
  const div = document.createElement('div');
  let html = `<div style="margin-bottom: 8px;"><strong>查询:</strong> 餐厅="${escapeHtml(t.query.restaurant_name)}" 菜="${escapeHtml((t.query.dish_names||[]).join(', '))}"</div>`;
  html += `<div><strong>命中 ${t.matched_dishes.length} 道菜:</strong></div>`;
  html += `<table><thead><tr><th>dish_id</th><th>菜名</th><th>餐厅</th><th>阶段</th><th>原因</th></tr></thead><tbody>`;
  t.matched_dishes.forEach(d => {
    const stageClass = d.stage === 'passed_recall' ? 'badge-green' :
                        (d.stage === 'unknown' ? 'badge-grey' : 'badge-red');
    html += `<tr>
      <td style="color: var(--fg-dim);">${escapeHtml(d.dish_id)}</td>
      <td>${escapeHtml(d.name)}</td>
      <td>${escapeHtml(d.restaurant_name || d.restaurant_id)}</td>
      <td><span class="badge ${stageClass}">${escapeHtml(d.stage)}</span></td>
      <td>${escapeHtml(d.reason || '—')}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  html += `<div style="margin-top: 12px;"><strong>包含这些菜的 combos 在 ranked 中:</strong></div>`;
  if (!t.matched_combos_in_ranked.length) {
    html += `<div style="color: var(--fg-dim); padding: 6px 0;">没有 combo 通过召回 (菜被丢, 或没构成合规 combo)</div>`;
  } else {
    html += `<table><thead><tr><th>rank</th><th>score</th><th>combo</th></tr></thead><tbody>`;
    t.matched_combos_in_ranked.forEach(c => {
      html += `<tr><td>${c.rank}</td><td class="num">${c.score}</td><td>${escapeHtml(c.signature)}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `<div style="margin-top: 12px;"><strong>是否进 final top 5:</strong> ${t.in_final ? '<span class="badge badge-green">是</span>' : '<span class="badge badge-red">否</span>'}</div>`;
  div.innerHTML = html;
  container.appendChild(div);
}

function renderResult(data) {
  clearOutput();
  renderStatus(data.config);
  const result = $('result');

  // target trace 优先放最上
  if (data.target_trace) {
    const {sec, body} = sectionEl('追溯', 'combo 命运', '', true);
    renderTarget(data.target_trace, body);
    result.appendChild(sec);
  }

  // L1
  const l1s = data.l1_recall.summary;
  const banTotal = (l1s.n_banned_rests_by_eta || 0) + (l1s.n_banned_rests_by_name || 0) + (l1s.n_diversity_avoid_rests || l1s.n_avoid_rests || 0);
  const priceDrop = l1s.n_combos_dropped_by_price ? ` − 价超 ${l1s.n_combos_dropped_by_price}` : '';
  const {sec: s1, body: b1} = sectionEl(
    'L1', '召回',
    `${l1s.total_dishes} 菜 / ${l1s.total_restaurants} 家 · ban ${banTotal} 家 → 硬过滤 ${l1s.after_hard_filter} → 多样性 ${l1s.after_diversity_filter} → ${l1s.n_combos_before_price_filter || l1s.n_combos} combos${priceDrop} → ${l1s.n_combos} 终`,
    true
  );
  renderL1(data.l1_recall, b1);
  result.appendChild(s1);

  // L2
  const l2s = data.l2_score.summary;
  const {sec: s2, body: b2} = sectionEl(
    'L2', '打分',
    `${l2s.n_scored} combos · score [${l2s.score_min}, ${l2s.score_max}]`,
    true
  );
  renderL2(data.l2_score, b2);
  result.appendChild(s2);

  // L3
  const l3 = data.l3_rerank;
  const llm = l3.llm || {};
  const l3Summary = !llm.used
    ? `跳过 LLM, 走规则 fallback`
    : (llm.parsed_candidates ? `LLM 成功 → ${l3.n_returned} 条` : `LLM 失败 → fallback ${l3.n_returned} 条`);
  const {sec: s3, body: b3} = sectionEl('L3', '精排', l3Summary, false);
  renderL3(l3, b3);
  result.appendChild(s3);

  // Final
  const {sec: sf, body: bf} = sectionEl(
    '终选', `top ${data.final.length}`,
    data.final.map(c => `#${c.rank} ${c.restaurant.name}`).join(' · '),
    true
  );
  renderFinal(data.final, bf);
  result.appendChild(sf);

  // Context
  const {sec: sc, body: bc} = sectionEl('Context', 'D-034 ContextSnapshot', '', false);
  bc.innerHTML = `<pre class="json-inline">${escapeHtml(JSON.stringify(data.context, null, 2))}</pre>`;
  result.appendChild(sc);
}

function renderMoodCompare(data) {
  clearOutput();
  const result = $('result');
  const div = document.createElement('div');
  div.style.marginBottom = '12px';
  div.innerHTML = `<h3 style="margin: 0 0 8px;">mood 横向对比 (top 5 + L2 top 5)</h3>`;
  result.appendChild(div);
  const grid = document.createElement('div');
  grid.className = 'mood-grid';
  for (const mood of Object.keys(data)) {
    const col = document.createElement('div');
    col.className = 'mood-col';
    let html = `<h4>${escapeHtml(mood)} ${data[mood].fallback_used ? '<span class="badge badge-orange" style="float:right;">fallback</span>' : '<span class="badge badge-green" style="float:right;">LLM</span>'}</h4>`;
    html += `<div style="font-size: 11px; color: var(--fg-dim); margin-bottom: 4px;">final top 5:</div>`;
    data[mood].final.forEach(c => {
      html += `<div style="font-size: 12px; padding: 3px 0; border-bottom: 1px dashed var(--border);">
        <strong>#${c.rank}</strong> ${escapeHtml(c.restaurant.name)} <span style="color: var(--fg-dim); font-family: monospace;">${c.score}</span>
        <div style="font-size: 11px; color: var(--fg-dim);">${escapeHtml(c.dishes.map(d => d.name).join(' + '))}</div>
        <div style="font-size: 11px;">${escapeHtml(c.one_line_reason || '')}</div>
      </div>`;
    });
    html += `<div style="font-size: 11px; color: var(--fg-dim); margin-top: 10px;">L2 打分 top 5:</div>`;
    data[mood].l2_top5.forEach(c => {
      html += `<div style="font-size: 11px; padding: 2px 0; font-family: monospace;">#${c.rank} ${c.score} · ${escapeHtml(c.signature)}</div>`;
    });
    col.innerHTML = html;
    grid.appendChild(col);
  }
  result.appendChild(grid);
}

// ---------- 事件 ----------

$('btn-run').onclick = async () => {
  try {
    clearOutput();
    setLoading(true);
    const req = getCommonReq(false);
    const data = await postJson('/api/debug_recommend', req);
    renderResult(data);
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
};

$('btn-trace').onclick = async () => {
  try {
    clearOutput();
    setLoading(true);
    const req = getCommonReq(true);
    if (!req.trace_target) {
      throw new Error('请填餐厅名或菜名');
    }
    const data = await postJson('/api/debug_recommend', req);
    renderResult(data);
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
};

$('btn-compare').onclick = async () => {
  try {
    clearOutput();
    setLoading(true);
    const common = getCommonReq(false);
    const data = await postJson('/api/compare_moods', {
      moods: ['want_light', 'want_soup', 'want_indulgent'],
      meal_type: common.meal_type,
      today: common.today,
      use_llm_rerank: common.use_llm_rerank,
      profile_overrides: common.profile_overrides,
    });
    renderMoodCompare(data);
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
};

$('btn-clear').onclick = () => { clearOutput(); };

$('btn-show-profile').onclick = async () => {
  try {
    const p = await fetch('/api/profile').then(r => r.json());
    const w = window.open('', '_blank');
    w.document.write(`<pre>${JSON.stringify(p, null, 2)}</pre>`);
  } catch (e) {
    showError(e.message);
  }
};

// 默认今天
$('today').value = new Date().toISOString().slice(0, 10);
</script>
