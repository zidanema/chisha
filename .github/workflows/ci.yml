name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Dummy keys: 测试全程 mock 实际 LLM 调用, 仅需 key 存在以过 provider client 构造。
      # 无 key 会让 rerank 走 config_error 而非 fallback (假性红, 见 tests/test_rerank_trace_fields.py)。
      OPENROUTER_API_KEY: sk-or-v1-dummy-ci-key
      ANTHROPIC_API_KEY: sk-ant-dummy-ci-key
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Sync deps
        run: uv sync --extra dev
      - name: Run tests (pytest + wheel content gate)
        run: uv run pytest tests/ -q
